<title>ArUco Marker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: #eee;

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;

    gap: 20px;
    padding: 20px;

  input[type=range] { width: 100px; accent-color: #0af; }
  span.val { font-size: 12px; color: #0af; min-width: 28px; }
  #marker-wrap {
    background: #fff;
    padding: 20px;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,170,255,0.15);
    display: inline-block;
  }
  canvas { display: block; image-rendering: pixelated; }
  #info { font-size: 10px; color: #444; text-align: center; line-height: 1.8; }

</style>
</head>

    for (let c = 0; c < n; c++) {
      ctx.fillStyle = bits[r][c] === 1 ? '#000000' : '#ffffff';
      ctx.fillRect((c + 1) * cell, (r + 1) * cell, cell, cell);
    }
  }
}

function update() {
  const dict   = document.getElementById('dict-sel').value;
  const idEl   = document.getElementById('id-range');
  const sizeEl = document.getElementById('size-range');
  const max    = dictMax[dict];

  idEl.max = max;
  if (parseInt(idEl.value) > max) idEl.value = 0;

  const id   = parseInt(idEl.value);
  const size = parseInt(sizeEl.value);

  document.getElementById('id-val').textContent   = id;
  document.getElementById('size-val').textContent = size;
  document.getElementById('dict-info').textContent =
    dictNames[dict] + ' / ID: ' + id;

  const bits = ARUCO_DATA[dict][id];
  drawMarker(document.getElementById('c'), bits, size);
}

document.getElementById('dict-sel').addEventListener('change', update);
document.getElementById('id-range').addEventListener('input',  update);
document.getElementById('size-range').addEventListener('input', update);

update();
</script>
</body>
</html>
